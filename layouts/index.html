创建首页模板 index.html，展示欢迎语和文章列表。{{ define "main" }}
<section class="home-intro tech-home" style="text-align:center; margin-bottom:2em;">
  <h2 class="tech-title">欢迎来到我的博客</h2>
  <p class="tech-slogan">探索技术 · 分享知识 · 记录成长</p>
  <div class="tech-circuit-bg"></div>
</section>
<section class="post-list">
  <h3 class="tech-list-title">最新文章</h3>
  <ul>
    {{ range .Site.RegularPages.ByDate.Reverse }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <span class="date">{{ .Date.Format "2006-01-02" }}</span>
      </li>
    {{ else }}
      <li>暂无文章，快去发表第一篇吧！</li>
    {{ end }}
  </ul>
</section>
{{ end }}
