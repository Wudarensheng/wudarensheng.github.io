<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- 可以使用Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-papXQq8Z6k8gK1jZ3fM8d3Q6vZJ2Kx4XhK1k0G9m3n9x3G6iV1f1g8G2p8X9gY1vC4n4g1z8iZ1zX6z5e0u1vA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <!-- 导航栏 -->
    <nav>
        <div class="container">
            <div class="logo">
                <a href="#">我的主页</a>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="#about">关于我</a></li>
                <li><a href="#skills">技能</a></li>
                <li><a href="#projects">项目</a></li>
                <li><a href="#contact">联系我</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- 主页横幅 -->
    <header class="hero">
        <div class="container">
            <h1>你好，我是[你的名字]</h1>
            <p>一个充满激情的[你的职业或兴趣]</p>
            <a href="#about" class="btn">了解更多</a>
        </div>
    </header>

    <!-- 关于我 -->
    <section id="about" class="about">
        <div class="container">
            <h2>关于我</h2>
            <img src="images/profile.jpg" alt="我的照片" class="profile-pic">
            <p>
                这里是关于你的简介。你可以介绍你的背景、兴趣、职业目标等。
            </p>
        </div>
    </section>

    <!-- 技能 -->
    <section id="skills" class="skills">
        <div class="container">
            <h2>我的技能</h2>
            <div class="skill-group">
                <div class="skill">
                    <i class="fab fa-html5"></i>
                    <h3>HTML5</h3>
                </div>
                <div class="skill">
                    <i class="fab fa-css3-alt"></i>
                    <h3>CSS3</h3>
                </div>
                <div class="skill">
                    <i class="fab fa-js-square"></i>
                    <h3>JavaScript</h3>
                </div>
                <!-- 添加更多技能 -->
            </div>
        </div>
    </section>

    <!-- 项目 -->
    <section id="projects" class="projects">
        <div class="container">
            <h2>我的项目</h2>
            <div class="project-grid">
                <div class="project-item">
                    <img src="images/project1.jpg" alt="项目1">
                    <h3>项目名称1</h3>
                    <p>项目描述1</p>
                </div>
                <div class="project-item">
                    <img src="images/project2.jpg" alt="项目2">
                    <h3>项目名称2</h3>
                    <p>项目描述2</p>
                </div>
                <!-- 添加更多项目 -->
            </div>
        </div>
    </section>

    <!-- 联系我 -->
    <section id="contact" class="contact">
        <div class="container">
            <h2>联系我</h2>
            <form action="https://formspree.io/f/mdovgnqe" method="POST">
                <input type="text" name="name" placeholder="你的名字" required>
                <input type="email" name="_replyto" placeholder="你的邮箱" required>
                <textarea name="message" placeholder="你的消息" required></textarea>
                <button type="submit" class="btn">发送消息</button>
            </form>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2025 [你的名字]. 版权所有.</p>
            <div class="social-links">
                <a href="https://www.linkedin.com/" target="_blank"><i class="fab fa-linkedin"></i></a>
                <a href="https://github.com/" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://twitter.com/" target="_blank"><i class="fab fa-twitter"></i></a>
                <!-- 添加更多社交链接 -->
            </div>
        </div>
    </footer>

    <script src="js/scripts.js"></script>
</body>
</html>
